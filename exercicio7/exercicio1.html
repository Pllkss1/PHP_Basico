<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condições com Switch Case</title>
</head>

<body>
    <div>
        <h1>Digite um número e escolha calcular o Dobro, o Cubo, ou a Raiz Quadrada!</h1>
        <form method="get" action="exercicio1.php">
            Número: <input type="number" name="num" /><br />
            <fieldset>
                <input type="radio" name="oper" id="dobro" value="1" checked />
                <label for="dobro">Dobro</label>
                <input type="radio" name="oper" id="cubo" value="2" />
                <label for="cubo">Cubo</label>
                <input type="radio" name="oper" id="raiz" value="3" />
                <label for="raiz">Raiz Quadrada</label>
            </fieldset>
            <input type="submit" value="Calcular" /><br />
        </form>
    </div>
