<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3 - Personalizar um texto através de um formulário</title>
</head>

<body>
    <div>
        <h1>Exercício 3 - Personalizar um texto através de um formulário</h1><br />
        <form method="get" action="exercicio3php.php">
            <label for="itxt">Texto: </label>
            <input type="text" name="t" id="itxt" /><br />
            <label for="itam">Tamanho</label>
            <select name="tam" id="itam">
                <option value="8pt">8</option>
                <option value="12pt">12</option>
                <option value="16pt">16</option>
                <option value="25pt">25</option>
                <option value="40pt">40</option>
                <option value="55pt">55</option>
            </select><br />
            <label for="icor">Cor: </label>
            <input type="color" name="cor" id="icor" /> <br />
            <input type="submit" value="Gerar" />
        </form>

    </div>

</body>

</html>
